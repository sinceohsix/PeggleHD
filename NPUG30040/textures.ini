# Peggle Portable HD

# An HD texture pack for the PSP version of Peggle.
# All textures are dumped from the PS3 version of Peggle.
# For more information, please visit the link below.

# https://www.github.cpm/sinceohsix/PeggleHD

# Release 1.0

# -------------------------- textures.ini -------------------------- #

